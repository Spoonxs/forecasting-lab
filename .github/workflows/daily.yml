name: daily-lab

# Autonomous daily cloud run: pull fresh data, run every pipeline, post the Discord
# alert, and publish the dashboard to GitHub Pages. Reddit/YouTube/arXiv/FRED are all
# reachable from GitHub's runners. Two-job build/deploy shape matches GitHub's official
# Pages template. Add repo secrets DISCORD_WEBHOOK_URL and (optionally) SEC_USER_AGENT.

on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # the P8 price panel: a rolling cache so the nightly does cheap
      # incremental pulls instead of cold 1y fetches for the whole tier
      - name: Cache the price panel
        uses: actions/cache@v4
        with:
          path: data/prices
          key: price-panel-${{ github.run_id }}
          restore-keys: |
            price-panel-

      - name: Install
        run: pip install -e ".[all]"

      - name: Run pipelines, build dashboard, send alert
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m forecasting_lab.cli.run_all

      - name: Persist arena + forward-study + calibration + agent-desk state
        run: |
          git config user.name "flab-bot"
          git config user.email "flab-bot@users.noreply.github.com"
          git add -f data/sim/arena_state.json data/forward/ledger.json calibration_log.csv data/agent/ledger.json || true
          git diff --cached --quiet || (git commit -m "chore: daily state [skip ci]" && git push)

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
