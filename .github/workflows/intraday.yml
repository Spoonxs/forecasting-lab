name: intraday-lab

# Fast market-hours refresh: every 30 minutes during US trading hours, pull fresh
# trending stocks + live prediction-market odds + macro, rebuild the dashboard, and
# republish to Pages. The heavy jobs (research, media, arena, forward study) stay on
# the once-a-day daily-lab run. Shares the "pages" concurrency group with daily-lab
# so the two never deploy at the same time.
#
# Cron is UTC; 13:00-21:00 UTC ~ 09:00-17:00 US Eastern, Mon-Fri. GitHub may delay
# scheduled runs under load, so the cadence is best-effort, not exact.

on:
  schedule:
    - cron: "*/30 13-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[all]"

      - name: Fast refresh (movers + odds + macro), rebuild dashboard
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m forecasting_lab.cli.intraday

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
