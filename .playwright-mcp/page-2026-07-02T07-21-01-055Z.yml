                - textbox "file content" [ref=f5e252]: "name: daily-lab # Autonomous cloud run: every day GitHub's runners pull fresh data, run every # pipeline, and publish the dashboard to GitHub Pages. No server to maintain, and # — unlike a locked-down local network — Reddit, arXiv, FRED and the venues are # all reachable from GitHub's runners, so the social-velocity signal is live here. # # Setup (one time): Settings > Pages > Source = \"GitHub Actions\"; optionally add a # repository secret SEC_USER_AGENT = \"your-project you@example.com\". on: schedule: - cron: \"30 11 * * *\" # 11:30 UTC (~07:30 US Eastern) workflow_dispatch: {} # allow manual \"Run workflow\" permissions: contents: write # commit the calibration log / arena state back pages: write id-token: write concurrency: group: daily-lab cancel-in-progress: false jobs: run: runs-on: ubuntu-latest environment: name: github-pages url: ${{ steps.deploy.outputs.page_url }} steps: - uses: actions/checkout@v4 - uses: actions/setup-python@v5 with: python-version: \"3.12\" cache: pip - name: Install run: pip install -e \".[all]\" - name: Run all pipelines (failure-tolerant) + build dashboard + alert env: SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'forecasting-lab research contact@example.com' }} # Add DISCORD_WEBHOOK_URL as a repo secret (Settings > Secrets and # variables > Actions) — do NOT commit it. The daily run then posts # the alert to your Discord even with your PC off. DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }} run: python -m forecasting_lab.cli.run_all - name: Persist arena state + calibration log run: | git config user.name \"flab-bot\" git config user.email \"flab-bot@users.noreply.github.com\" git add -f data/sim/arena_state.json data/forward/ledger.json calibration_log.csv 2>/dev/null || true if ! git diff --cached --quiet; then git commit -m \"chore: daily arena + calibration state [skip ci]\" git push else echo \"no state changes to commit\" fi - name: Upload dashboard for Pages uses: actions/upload-pages-artifact@v3 with: path: site - name: Deploy to GitHub Pages id: deploy uses: actions/deploy-pages@v4"
